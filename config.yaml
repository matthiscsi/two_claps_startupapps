audio_settings:
  enabled: false
  file_path: ''
  mode: tts
  startup_phrase: Good morning, Boss. Initializing systems.
  success_phrase: Systems online. Have a productive day.
clap_settings:
  filter_high: 1800
  filter_low: 1400
  frame_duration: 0.02
  min_interval: 0.2
  order: 2
  sampling_rate: 44100
  threshold: 0.15
logging:
  file: launcher.log
  level: INFO
routines:
  morning_routine:
    items:
    - delay: 0
      monitor: primary
      name: HLN News
      position: full
      target: https://www.hln.be/
      type: url
    - delay: 2
      monitor: 1
      name: Discord
      position: full
      target: discord
      type: app
    - delay: 1
      monitor: 1
      name: Spotify
      position: full
      target: spotify
      type: app
