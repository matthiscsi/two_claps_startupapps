name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install core and dev dependencies, but skip Windows-only and PyAudio (not needed for logic tests)
        pip install pyyaml psutil pytest screeninfo numpy scipy gTTS pygame pystray Pillow

    - name: Run tests
      env:
        PYTHONPATH: .
      run: |
        python -m pytest tests/
