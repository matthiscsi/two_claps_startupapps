name: Build and Release Windows Executable

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-core.txt
        pip install pytest pyinstaller
        pip install pywin32 pyaudio

    - name: Run tests
      env:
        PYTHONPATH: .
      run: |
        python -m pytest -q tests/

    - name: Build with PyInstaller
      run: |
        python build_exe.py

    - name: Create portable ZIP
      run: |
        powershell -Command "Compress-Archive -Path dist/JarvisLauncher.exe -DestinationPath dist/JarvisLauncher-portable.zip -Force"

    - name: Install Inno Setup
      run: |
        choco install innosetup -y

    - name: Build installer
      shell: powershell
      run: |
        $version = if ($env:GITHUB_REF -like 'refs/tags/v*') { $env:GITHUB_REF.Replace('refs/tags/v','') } else { '0.1.0-dev' }
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$version" "installer\JarvisLauncher.iss"

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: JarvisLauncher-Windows
        path: |
          dist/JarvisLauncher.exe
          dist/JarvisLauncher-portable.zip
          dist/JarvisLauncher-Setup-*.exe
        if-no-files-found: error

    - name: Release
      if: startsWith(github.ref, 'refs/tags/v')
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        tag_name="${GITHUB_REF#refs/tags/}"
        files=(dist/JarvisLauncher.exe dist/JarvisLauncher-portable.zip dist/JarvisLauncher-Setup-*.exe)
        if ! gh release view "$tag_name" >/dev/null 2>&1; then
          gh release create "$tag_name" "${files[@]}" --title "Release $tag_name" --notes "Automated release for version $tag_name"
        else
          gh release upload "$tag_name" "${files[@]}" --clobber
        fi
